# ECCV Caption benchmark evaluation config.
# Uses existing COCO images & Karpathy captions — ECCV is a protocol, not a new dataset.
# WandB project is isolated from training ("retrieval") logs.

data:
  images_path: "datasets/coco"
  captions_path: "datasets/coco/caption_datasets/dataset_coco.json"

logging:
  wandb_project: "retrieval-benchmark"
