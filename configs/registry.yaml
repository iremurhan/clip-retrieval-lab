runs:
  B0:
    description: "Minimal FT — InfoNCE, projection layers only, no aug, no intra-modal"
    overrides:
      logging.eval_epoch_zero: true
      loss.intra_img_weight: 0
      loss.intra_txt_weight: 0
      augment.k_photometric_augs: 0

  B0_uf5:
    description: "B0 + unfreeze last 5 vision blocks"
    parent: B0
    overrides:
      model.unfreeze_vision_layers: 5

  B0_uf6:
    description: "B0 + unfreeze last 6 vision blocks"
    parent: B0
    overrides:
      model.unfreeze_vision_layers: 6

  B0_uf7:
    description: "B0 + unfreeze last 7 vision blocks"
    parent: B0
    overrides:
      model.unfreeze_vision_layers: 7

  B0plus:
    description: "B0+ baseline — bipartite augmentation + paraphrase pair + intra-modal + 4-layer unfreeze"
    overrides: {}  # current config_base.yaml defaults

  B0v3:
    description: "B0+ with B0v2-tuned augmentation magnitudes; leak-free pair-based intra-modal"
    parent: B0plus
    overrides:
      augment.aug_crop_scale_min: 0.7
      augment.color_jitter_strength: 0.2
      augment.use_grayscale: false

  B1:
    description: "B0+ + SigLIP loss (replaces InfoNCE)"
    parent: B0plus
    overrides:
      loss.type: siglip

  B2:
    description: "B0+ + syntactic hard negatives (NegCLIP-style POS-tag swapping)"
    parent: B0plus
    overrides:
      loss.hard_negatives: true

  B4:
    description: "B0+ + multi-label classification auxiliary loss (80 COCO categories, COCO-only)"
    parent: B0plus
    overrides:
      loss.cls_weight: 1.0
      loss.cls_num_classes: 80

  B5a_seg_spatial:
    description: "B0+ + segment-aware patches with spatial binning (3x3 grid x 3 size bins = 27 + bg = 28)"
    parent: B0plus
    overrides:
      model.seg_mode: spatial
      model.seg_vocab_size: 28

  # B5b semantic uses 81-element vocab: 0 = background, 1..80 = COCO categories.
  # Label sources differ by dataset (see scripts/precompute_sam.py):
  #   - COCO:      IoU-match SAM masks against instances_{train,val}2014 (threshold = 0.3).
  #   - Flickr30k: zero-shot CLIP top-1 over the 80 COCO category prompts (prob >= 0.3 else bg);
  #                SAM segments with bbox <4 px on either side are dropped to background.
  B5b_seg_semantic:
    description: "B0+ + segment-aware patches with COCO 80-category IDs"
    parent: B0plus
    overrides:
      model.seg_mode: semantic
      model.seg_vocab_size: 81

  B5c_seg_continuous:
    description: "B0+ + segment-aware patches with continuous 5-d geometric MLP projection"
    parent: B0plus
    overrides:
      model.seg_mode: continuous
      model.seg_feature_dim: 5
      model.seg_proj_hidden: 128
