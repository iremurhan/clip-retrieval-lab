runs:
  B0:
    description: "Minimal FT — InfoNCE, projection layers only, no aug"
    overrides:
      logging.eval_epoch_zero: true
      loss.intra_img_weight: 0
      loss.intra_txt_weight: 0
      augment.k_photometric_augs: 0

  B0plus:
    description: "Full baseline — mix aug for img + paraphrase for txt + intra-modal + 4-layer unfreeze"
    overrides: {}  # current defaults, no changes needed

  B0v2:
    description: "B0+ with improved augmentation: LLM caption rewrites (replacing WordNet), reduced image aug (crop 0.7+, no grayscale), separate aug pipelines for inter/intra-modal"
    overrides:
      paraphraser.type: "llm_precomputed"
      paraphraser.precomputed_path: "datasets/coco/caption_rewrites_mistral-7b-instruct-v0.2.json"
      augment.aug_crop_scale_min: 0.7
      augment.color_jitter_strength: 0.2
      augment.use_grayscale: false
      augment.separate_pipelines: true

  B1:
    description: "B0+ + SigLIP loss (replaces InfoNCE)"
    overrides:
      loss.type: siglip

  B2:
    description: "B0+ + syntactic hard negatives (NegCLIP-style POS-tag swapping)"
    overrides:
      loss.hard_negatives: true

  B3:
    description: "B0+ + LoRA rank 8 replacing 4-layer unfreeze"
    overrides:
      model.lora_rank: 8
      model.unfreeze_vision_layers: 0

  B4:
    description: "B0+ + multi-label classification auxiliary loss (80 COCO categories)"
    overrides:
      loss.cls_weight: 1.0
      loss.cls_num_classes: 80

  FULL:
    description: "B0+ + SigLIP + hard negatives + LoRA"
    overrides:
      loss.type: siglip
      loss.hard_negatives: true
      model.lora_rank: 8
      model.unfreeze_vision_layers: 0