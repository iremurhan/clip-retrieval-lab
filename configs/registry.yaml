runs:
  B0:
    description: "Minimal FT — InfoNCE, projection layers only, no aug"
    overrides:
      logging.eval_epoch_zero: true
      loss.intra_img_weight: 0
      loss.intra_txt_weight: 0
      augment.k_photometric_augs: 0

  B0plus:
    description: "Full baseline — mix aug for img + paraphrase for txt + intra-modal + 4-layer unfreeze"
    overrides: {}  # current defaults, no changes needed

  B1:
    description: "B0+ + SigLIP loss (replaces InfoNCE)"
    overrides:
      loss.type: siglip

  B2:
    description: "B0+ + syntactic hard negatives (NegCLIP-style POS-tag swapping)"
    overrides:
      loss.hard_negatives: true

  B3:
    description: "B0+ + LoRA rank 8 replacing 4-layer unfreeze"
    overrides:
      model.lora_rank: 8
      model.unfreeze_vision_layers: 0

  FULL:
    description: "B0+ + SigLIP + hard negatives + LoRA"
    overrides:
      loss.type: siglip
      loss.hard_negatives: true
      model.lora_rank: 8
      model.unfreeze_vision_layers: 0

  B5a_seg_spatial:
    description: "B0+ + segment-aware patches with spatial binning (3x3 grid x 3 sizes = 27 bins + bg)"
    parent: B0plus
    overrides:
      model.seg_mode: spatial
      model.seg_vocab_size: 28
      model.seg_init_std: 0.02
      training.seg_lr: 0.001
      # data.seg_map_dir is set per-dataset in configs/config_{coco,flickr30k}.yaml

  B5b_seg_semantic:
    description: "B0+ + segment-aware patches with COCO 80 category IDs"
    parent: B0plus
    overrides:
      model.seg_mode: semantic
      model.seg_vocab_size: 81
      model.seg_init_std: 0.02
      training.seg_lr: 0.001

  B5c_seg_continuous:
    description: "B0+ + segment-aware patches with continuous geometric MLP projection"
    parent: B0plus
    overrides:
      model.seg_mode: continuous
      model.seg_feature_dim: 5
      model.seg_proj_hidden: 128
      training.seg_lr: 0.001