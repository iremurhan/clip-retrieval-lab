# Base configuration shared across datasets.
#
# Dataset-specific files (e.g. config_coco.yaml, config_flickr.yaml) only define:
# - data paths (images_path, captions_path)
#
# W&B: single project "clip-retrieval" for all runs; dataset is in run name and config.

model:
  image_model_name: "openai/clip-vit-large-patch14-336"
  embed_dim: null
  dropout: 0.1
  unfreeze_vision_layers: 4
  unfreeze_strategy: "full"

loss:
  intra_img_weight: 1
  intra_txt_weight: 0

training:
  # DataLoader-related defaults (will be mirrored into data.* at runtime)
  batch_size: 512
  num_workers: 8
  max_length: 77
  image_size: 336

  epochs: 10
  seed: 42
  use_grad_cache: true
  micro_batch_size: 128
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 2

  clip_projection_lr: 0.00005
  backbone_lr: 0.000002
  weight_decay: 0.01

augment:
  # Number of photometric transforms sampled from the VLM-safe pool per image.
  # Pool: [ColorJitter, GaussianBlur, RandomGrayscale]. Max k=3.
  k_photometric_augs: 2

debug:
  debug_mode: false
  debug_samples: 100

logging:
  use_wandb: true
  wandb_project: "clip-retrieval"
  log_freq: 500
  eval_freq: 1
  eval_epoch_zero: false
  eval_eccv: false
  save_freq: 3
  checkpoint_dir: "checkpoints"
  run_id: "unnamed"
