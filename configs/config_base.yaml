# Base configuration shared across datasets.
#
# Dataset-specific files (e.g. config_coco.yaml, config_flickr.yaml) only define:
# - data paths (images_path, captions_path)
#
# W&B: single project "retrieval" for training; dataset is in run name and config.

model:
  image_model_name: "openai/clip-vit-large-patch14-336"
  embed_dim: null
  unfreeze_vision_layers: 4
  unfreeze_strategy: "full"
  # B5a/B5b/B5c only: segment-aware patch enrichment. Leave seg_mode=null to
  # disable the variant entirely (zero overhead for B0/B0+/B1/B2/B3/FULL).
  # seg_mode: "spatial" (B5a) | "semantic" (B5b) | "continuous" (B5c) | null
  seg_mode: null
  # Discrete modes (spatial/semantic): size of the embedding table.
  seg_vocab_size: null
  # Init std for seg_embedding.weight (matches CLIP positional embedding scale).
  seg_init_std: 0.02
  # Continuous mode only: per-segment feature dim and MLP hidden width.
  seg_feature_dim: 5
  seg_proj_hidden: 128

loss:
  type: infonce
  intra_img_weight: 1
  intra_txt_weight: 1
  hard_negatives: false

paraphraser:
  precomputed_path: null  # set to path if pre-computed JSON exists; otherwise NLTK is used

training:
  batch_size: 128
  use_grad_cache: false

  epochs: 10
  seed: 42
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 2

  clip_projection_lr: 0.00005
  backbone_lr: 0.000002
  # B5a/B5b/B5c: base LR for seg_embedding / seg_projection groups.
  # These groups use a flat (non-cosine) schedule; see run.py.
  seg_lr: 0.001
  weight_decay: 0.01

data:
  max_length: 77
  num_workers: 4
  image_size: 336

augment:
  # Number of photometric transforms sampled from the configurable pool per image.
  # Pool: [ColorJitter, GaussianBlur] + RandomGrayscale (if use_grayscale=true).
  k_photometric_augs: 2
  # Lower bound of RandomResizedCrop scale on the augmented contrastive view.
  # B0v2_clean default; <0.4 is overcropping for VLM retrieval.
  aug_crop_scale_min: 0.4
  # ColorJitter (b/c/s) magnitude; hue is scaled by 0.25x internally.
  color_jitter_strength: 0.4
  # Include RandomGrayscale(p=1.0) in the photometric pool.
  use_grayscale: true
  # SLIP-style separate anchor / aug pipelines (anchor stays photometrically clean).
  separate_pipelines: true

# Configuration lineage — frozen provenance metadata. Forwarded into the
# WandB run config (see src/setup.py::make_wandb_config).
lineage:
  parent_branch: "B0v2"
  augmentation_scheme: "B0v2_clean"
  previous_baseline: "B0plus"

logging:
  use_wandb: true
  wandb_project: "clip-retrieval"
  log_freq: 500
  eval_freq: 1
  eval_epoch_zero: false
  save_freq: 3
  checkpoint_dir: "checkpoints"
