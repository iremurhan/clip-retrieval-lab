# Base configuration shared across datasets.
#
# Dataset-specific files (e.g. config_coco.yaml, config_flickr.yaml) only define:
# - data paths (images_path, captions_path)
#
# W&B: single project "retrieval" for training; dataset is in run name and config.

model:
  image_model_name: "openai/clip-vit-large-patch14-336"
  embed_dim: null
  dropout: 0.1
  unfreeze_vision_layers: 4
  unfreeze_strategy: "full"

loss:
  # Hard Negative Mining (FNE + neg_txt_embeds) only runs when use_clip_loss is false.
  use_clip_loss: false
  temperature: 0.07
  intra_img_weight: 1
  intra_txt_weight: 0

# On-the-fly paraphrasing config for L_text_text = InfoNCE(T_orig, T_paraphrased).
# Only loaded when loss.intra_txt_weight > 0. Safe to leave here with weight=0.
paraphraser:
  model_name: "mistralai/Mistral-7B-Instruct-v0.2"
  max_new_tokens: 60
  generation_temperature: 0.8
  do_sample: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

training:
  # DataLoader-related defaults (will be mirrored into data.* at runtime)
  batch_size: 128
  num_workers: 8
  max_length: 77
  image_size: 336

  epochs: 20
  seed: 42
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 2

  clip_projection_lr: 0.00005
  head_lr: 0.0005
  backbone_lr: 0.000002
  weight_decay: 0.01

augment:
  # Number of photometric transforms sampled from the VLM-safe pool per image.
  # Pool: [ColorJitter, GaussianBlur, RandomGrayscale]. Max k=3.
  k_photometric_augs: 2
  image:
    enabled: true

debug:
  debug_mode: false
  debug_samples: 100

logging:
  use_wandb: true
  log_freq: 500
  eval_freq: 1
  save_freq: 3
  checkpoint_dir: "checkpoints"
