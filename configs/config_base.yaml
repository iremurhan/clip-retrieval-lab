# Base configuration shared across datasets.
#
# Dataset-specific files (e.g. config_coco.yaml, config_flickr.yaml) only define:
# - data paths (images_path, captions_path)
#
# W&B: single project "retrieval" for training; dataset is in run name and config.

model:
  image_model_name: "openai/clip-vit-large-patch14-336"
  embed_dim: null
  unfreeze_vision_layers: 4
  unfreeze_strategy: "full"
  # B5_seg only: size of the SAM segment-embedding table. Leave null to
  # disable the variant entirely (zero overhead for B0/B0+/B1/B2/B3/FULL).
  seg_embed_size: null

loss:
  type: infonce
  intra_img_weight: 1
  intra_txt_weight: 1
  hard_negatives: false

paraphraser:
  precomputed_path: null  # set to path if pre-computed JSON exists; otherwise NLTK is used

training:
  batch_size: 128
  use_grad_cache: false

  epochs: 10
  seed: 42
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 2

  clip_projection_lr: 0.00005
  backbone_lr: 0.000002
  weight_decay: 0.01

data:
  max_length: 77
  num_workers: 4
  image_size: 336
  # B5_mask_only only: when true, the dataloader replaces each real RGB image
  # with a colorized render of its SAM segment map (deterministic palette,
  # nearest-neighbor resize). seg_map_dir is set per-dataset and reused from
  # the B5_seg pipeline. Leave false for all other variants.
  use_seg_as_image: false
  seg_palette_size: 64

augment:
  # Number of photometric transforms sampled from the VLM-safe pool per image.
  # Pool: [ColorJitter, GaussianBlur, RandomGrayscale]. Max k=3.
  k_photometric_augs: 2

logging:
  use_wandb: true
  wandb_project: "clip-retrieval"
  log_freq: 500
  eval_freq: 1
  eval_epoch_zero: false
  save_freq: 3
  checkpoint_dir: "checkpoints"
